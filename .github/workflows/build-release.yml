name: Build & Release Windows Setup

# ── Cuándo se ejecuta ──────────────────────────────────────────────────────
# 1. Automáticamente al hacer push de un tag  v*  (ej: v3.0.2, v3.1.0)
# 2. Manualmente desde GitHub → Actions → "Run workflow"
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write      # Necesario para crear GitHub Releases y subir assets

jobs:
  build-setup:
    name: Build Setup on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      # ── 3. Leer versión del proyecto ──────────────────────────────────
      - name: Obtener versión desde version.json
        id: version
        shell: python
        run: |
          import json, os
          with open('version.json', encoding='utf-8') as f:
              v = json.load(f)['version']
          print(f"Version: {v}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"version={v}\n")

      # ── 4. Icono PNG → ICO ────────────────────────────────────────────
      - name: Convertir icon.png a icon.ico
        run: |
          python -c "
          from PIL import Image, ImageDraw

          ICO_SIZES = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]

          def make_default_icon(size=256):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              d = ImageDraw.Draw(img)
              d.rounded_rectangle([4, 4, size-4, size-4], radius=size//8,
                                   fill=(76, 153, 0, 255))
              m = size // 4
              d.rectangle([m, m, size-m, size-m], fill=(255, 255, 255, 200))
              return img

          try:
              img = Image.open('assets/icon.png').convert('RGBA')
              w, h = img.size
              if w < 32 or h < 32:
                  print(f'Icono pequeño ({w}x{h}), usando icono por defecto')
                  img = make_default_icon(256)
              else:
                  img = img.resize((256, 256), Image.LANCZOS)
          except Exception as e:
              print(f'Error leyendo icon.png ({e}), usando icono por defecto')
              img = make_default_icon(256)

          imgs = [img.resize(s, Image.LANCZOS) for s in ICO_SIZES]
          imgs[0].save('assets/icon.ico', format='ICO',
                       append_images=imgs[1:], sizes=ICO_SIZES)
          print('OK: assets/icon.ico generado')
          "

      # ── 5. PyInstaller ────────────────────────────────────────────────
      - name: Compilar con PyInstaller
        run: pyinstaller build.spec --noconfirm --clean

      - name: Verificar que el EXE existe
        run: |
          if (!(Test-Path "dist\MC_Launcher\MC_Launcher.exe")) {
              Write-Error "No se encontró dist\MC_Launcher\MC_Launcher.exe"
              exit 1
          }
          $count = (Get-ChildItem "dist\MC_Launcher" -Recurse -File).Count
          Write-Host "OK: EXE encontrado — $count archivos en dist\MC_Launcher"
        shell: powershell

      # ── 6. Inno Setup ─────────────────────────────────────────────────
      - name: Crear carpeta de salida del instalador
        run: New-Item -ItemType Directory -Force -Path dist_installer
        shell: powershell

      - name: Compilar instalador con Inno Setup
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$ver installer\launcher.iss
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Inno Setup falló con código $LASTEXITCODE"
              exit 1
          }
        shell: powershell

      - name: Verificar instalador generado
        id: installer
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $name = "MC_Launcher_v${ver}_Windows_x64_Setup.exe"
          $path = "dist_installer\$name"
          if (!(Test-Path $path)) {
              Write-Error "No se encontró $path"
              Get-ChildItem dist_installer
              exit 1
          }
          $size = [math]::Round((Get-Item $path).Length / 1MB, 1)
          Write-Host "OK: $name generado ($size MB)"
          echo "installer_name=$name" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          echo "installer_path=$path" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
        shell: powershell

      # ── 7. Subir como artifact (descargable sin crear Release) ────────
      - name: Subir instalador como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC_Launcher_v${{ steps.version.outputs.version }}_Setup
          path: ${{ steps.installer.outputs.installer_path }}
          retention-days: 30

      # ── 8. Crear GitHub Release ───────────────────────────────────────
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MC Launcher v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          body: |
            ## ⛏️ MC Launcher v${{ steps.version.outputs.version }}

            ### 📥 Instalación
            1. Descarga `MC_Launcher_v${{ steps.version.outputs.version }}_Windows_x64_Setup.exe`
            2. Ejecuta el instalador (doble clic)
            3. Sigue el asistente — elige carpeta e instalación
            4. ¡Listo! Aparecerá en el Menú Inicio y en el Escritorio

            ### ⚙️ Requisitos
            - Windows 10 / 11 (64-bit)
            - Java 17 o superior *(el launcher lo detecta y avisa si no está instalado)*

            ### 🔄 Actualización desde versión anterior
            El instalador desinstala la versión anterior automáticamente.

            ---
            *Desarrollado con Python + customtkinter*
          files: ${{ steps.installer.outputs.installer_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
